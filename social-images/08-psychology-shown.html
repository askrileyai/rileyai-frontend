<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#050510; font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; position:relative; }
.container { padding:80px 70px; height:100%; display:flex; flex-direction:column; position:relative; z-index:2; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:80px; }
.logo { font-size:28px; font-weight:700; color:#fff; } .logo span { color:#00d4d8; }
.center { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
.big-quote { font-size:76px; font-weight:900; color:#fff; line-height:1.08; letter-spacing:-3px; margin-bottom:40px; max-width:900px; }
.big-quote .cyan { color:#00d4d8; }
.divider { width:80px; height:4px; background:#f97316; border-radius:2px; margin-bottom:40px; }
.sub { font-size:28px; color:rgba(255,255,255,0.45); line-height:1.5; max-width:700px; font-weight:500; }
.bottom { display:flex; justify-content:space-between; align-items:flex-end; }
.cta { font-size:22px; color:rgba(255,255,255,0.4); } .cta strong { color:#f97316; }
.handle { font-size:16px; color:rgba(255,255,255,0.25); letter-spacing:2px; font-weight:600; }
</style></head><body>
<div class="container">
  <div class="top-bar">
    <div class="logo">Riley<span>AI</span></div>
  </div>
  <div class="center">
    <div class="big-quote">"Riley showed me my <span class="cyan">trading pattern.</span>"</div>
    <div class="divider"></div>
    <div class="sub">You can't fix what you can't see. Riley watches every trade, tracks your behavior, and shows you exactly where you're leaking money.</div>
  </div>
  <div class="bottom">
    <div class="cta">See your patterns. <strong>askrileyai.com</strong></div>
    <div class="handle">@askrileyai</div>
  </div>
</div>
</body></html>
