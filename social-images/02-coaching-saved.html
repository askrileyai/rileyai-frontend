<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#050510; font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; position:relative; }
.bg-glow { position:absolute; top:30%; left:50%; transform:translateX(-50%); width:900px; height:900px; background:radial-gradient(circle,rgba(0,212,216,0.06) 0%,transparent 60%); }
.container { padding:80px 70px; height:100%; display:flex; flex-direction:column; position:relative; z-index:2; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:50px; }
.logo { font-size:28px; font-weight:700; color:#fff; } .logo span { color:#00d4d8; }
.badge { background:rgba(0,212,216,0.1); border:1px solid rgba(0,212,216,0.25); color:#00d4d8; font-size:14px; font-weight:600; padding:8px 18px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }
.hook { font-size:66px; font-weight:900; color:#fff; line-height:1.12; margin-bottom:50px; letter-spacing:-2px; }
.hook .cyan { color:#00d4d8; }
.stat-row { display:flex; gap:24px; margin-bottom:50px; }
.stat-card { flex:1; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:20px; padding:30px; text-align:center; }
.stat-number { font-size:48px; font-weight:800; color:#00d4d8; margin-bottom:8px; }
.stat-number.orange { color:#f97316; }
.stat-label { font-size:16px; color:rgba(255,255,255,0.4); font-weight:500; }
.quote { font-size:32px; color:rgba(255,255,255,0.6); font-style:italic; line-height:1.5; padding:30px 40px; border-left:4px solid #f97316; margin-bottom:40px; }
.bottom { margin-top:auto; display:flex; justify-content:space-between; align-items:flex-end; }
.cta { font-size:22px; color:rgba(255,255,255,0.4); } .cta strong { color:#00d4d8; font-weight:700; }
.handle { font-size:16px; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; font-weight:600; }
</style></head><body>
<div class="bg-glow"></div>
<div class="container">
  <div class="top-bar">
    <div class="logo">Riley<span>AI</span></div>
    <div class="badge">Live Coaching</div>
  </div>
  <div class="hook">Riley caught this <span class="cyan">before I lost money.</span></div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-number">3</div><div class="stat-label">Bad trades blocked</div></div>
    <div class="stat-card"><div class="stat-number orange">$847</div><div class="stat-label">Saved this week</div></div>
    <div class="stat-card"><div class="stat-number">100%</div><div class="stat-label">Plan compliance</div></div>
  </div>
  <div class="quote">"She told me to wait. I listened. The trade came to me 20 minutes later — at a better price."</div>
  <div class="bottom">
    <div class="cta">Trade smarter. <strong>askrileyai.com</strong></div>
    <div class="handle">@askrileyai</div>
  </div>
</div>
</body></html>
