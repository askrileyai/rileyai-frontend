<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download RileyAI</title>
    <link rel="icon" type="image/png" href="/rileyai-logo-512.png">
    <link rel="apple-touch-icon" href="/rileyai-logo-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a14;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
            padding: 32px 24px;
        }
        .wrap { max-width: 360px; }
        .logo {
            width: 56px; height: 56px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 14px;
        }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p.sub { font-size: 14px; color: #9aa4b2; margin-bottom: 26px; }
        a.badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s ease;
        }
        a.badge:hover { transform: translateY(-1px); }
        a.apple { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); color: #fff; }
        a.google { background: linear-gradient(180deg, #bae6fd 0%, #7dd3fc 50%, #38bdf8 100%); color: #06142a; }
        .redirecting { font-size: 12.5px; color: #5f6b80; margin-top: 18px; }
    </style>
</head>
<body>
    <div class="wrap">
        <img class="logo" src="/rileyai-logo-512.png" alt="RileyAI">
        <h1>Get RileyAI</h1>
        <p class="sub">Your live trading sidekick. Available now.</p>

        <a class="badge apple" href="https://apps.apple.com/us/app/rileyai/id6764694326">

            App Store
        </a>
        <a class="badge google" href="https://play.google.com/store/apps/details?id=com.rileyai.mobile">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#04121a" aria-hidden="true"><path d="M3.6 2.6c-.4.4-.6.9-.6 1.5v15.8c0 .6.2 1.1.6 1.5l.1.1L13 12l-9.3-9.3-.1-.1z"/><path opacity="0.9" d="M16.3 15.3l-3.3-3.3v-.1l3.3-3.3 4.3 2.4c.9.5.9 1.9 0 2.4l-4.3 2.4v.1z"/><path opacity="0.75" d="M13 12l3.3-3.3L4.6 2.4c-.3-.2-.7-.2-1 0L13 12z"/><path opacity="0.85" d="M13 12L4.6 21.6c.3.2.7.2 1 0l11.7-6.3L13 12z"/></svg>
            Google Play
        </a>
        <p class="redirecting" id="redirectMsg"></p>
    </div>

    <script>
        (function () {
            var ua = navigator.userAgent || '';
            var isIOS = /iPhone|iPad|iPod/i.test(ua);
            var isAndroid = /Android/i.test(ua);
            var msg = document.getElementById('redirectMsg');
            if (isIOS) {
                if (msg) msg.textContent = 'Opening the App Store…';
                window.location.replace('https://apps.apple.com/us/app/rileyai/id6764694326');
            } else if (isAndroid) {
                if (msg) msg.textContent = 'Opening Google Play…';
                window.location.replace('https://play.google.com/store/apps/details?id=com.rileyai.mobile');
            }
            // Desktop / unknown device: stay on this page, both badges shown above.
        })();
    </script>
</body>
</html>
