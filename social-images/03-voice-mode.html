<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#050510; font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; position:relative; }
.bg-glow { position:absolute; top:20%; left:30%; width:700px; height:700px; background:radial-gradient(circle,rgba(0,212,216,0.1) 0%,transparent 60%); }
.bg-glow2 { position:absolute; bottom:10%; right:20%; width:500px; height:500px; background:radial-gradient(circle,rgba(249,115,22,0.08) 0%,transparent 60%); }
.container { padding:80px 70px; height:100%; display:flex; flex-direction:column; position:relative; z-index:2; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:60px; }
.logo { font-size:28px; font-weight:700; color:#fff; } .logo span { color:#00d4d8; }
.badge { background:rgba(249,115,22,0.12); border:1px solid rgba(249,115,22,0.3); color:#f97316; font-size:14px; font-weight:600; padding:8px 18px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }
.hook { font-size:68px; font-weight:900; color:#fff; line-height:1.1; margin-bottom:50px; letter-spacing:-2px; }
.hook .cyan { color:#00d4d8; } .hook .orange { color:#f97316; }
.voice-visual { display:flex; align-items:center; gap:30px; margin-bottom:50px; padding:40px; background:rgba(0,212,216,0.04); border:1px solid rgba(0,212,216,0.12); border-radius:24px; }
.waveform { display:flex; align-items:center; gap:6px; }
.wave-bar { width:8px; border-radius:4px; background:linear-gradient(180deg,#00d4d8,#0891b2); }
.voice-text { flex:1; }
.voice-label { font-size:18px; font-weight:700; color:#00d4d8; margin-bottom:8px; letter-spacing:1px; }
.voice-content { font-size:26px; color:rgba(255,255,255,0.8); line-height:1.5; }
.features { display:flex; gap:20px; margin-bottom:40px; }
.feature { flex:1; padding:24px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:16px; text-align:center; }
.feature-icon { font-size:36px; margin-bottom:12px; }
.feature-text { font-size:18px; color:rgba(255,255,255,0.5); font-weight:500; }
.bottom { margin-top:auto; display:flex; justify-content:space-between; align-items:flex-end; }
.cta { font-size:22px; color:rgba(255,255,255,0.4); } .cta strong { color:#00d4d8; }
.handle { font-size:16px; color:rgba(255,255,255,0.25); letter-spacing:2px; font-weight:600; }
</style></head><body>
<div class="bg-glow"></div><div class="bg-glow2"></div>
<div class="container">
  <div class="top-bar">
    <div class="logo">Riley<span>AI</span></div>
    <div class="badge">Voice Mode</div>
  </div>
  <div class="hook">"I just asked my AI if I should <span class="cyan">enter.</span>"</div>
  <div class="voice-visual">
    <div class="waveform">
      <div class="wave-bar" style="height:20px"></div>
      <div class="wave-bar" style="height:40px"></div>
      <div class="wave-bar" style="height:60px"></div>
      <div class="wave-bar" style="height:80px"></div>
      <div class="wave-bar" style="height:55px"></div>
      <div class="wave-bar" style="height:70px"></div>
      <div class="wave-bar" style="height:45px"></div>
      <div class="wave-bar" style="height:65px"></div>
      <div class="wave-bar" style="height:35px"></div>
      <div class="wave-bar" style="height:50px"></div>
      <div class="wave-bar" style="height:75px"></div>
      <div class="wave-bar" style="height:40px"></div>
    </div>
    <div class="voice-text">
      <div class="voice-label">RILEY SPEAKING</div>
      <div class="voice-content">"Not yet. Wait for buyers to step in at 542. That's your level."</div>
    </div>
  </div>
  <div class="features">
    <div class="feature"><div class="feature-icon">🎙️</div><div class="feature-text">Hands-free</div></div>
    <div class="feature"><div class="feature-icon">⚡</div><div class="feature-text">Real-time</div></div>
    <div class="feature"><div class="feature-icon">🧠</div><div class="feature-text">Context-aware</div></div>
  </div>
  <div class="bottom">
    <div class="cta">Talk to your trades. <strong>askrileyai.com</strong></div>
    <div class="handle">@askrileyai</div>
  </div>
</div>
</body></html>
