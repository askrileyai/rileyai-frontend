<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#050510; font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; position:relative; }
.bg { position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(180deg,rgba(0,212,216,0.03) 0%,transparent 40%,rgba(249,115,22,0.03) 100%); }
.container { padding:80px 70px; height:100%; display:flex; flex-direction:column; position:relative; z-index:2; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:80px; }
.logo { font-size:28px; font-weight:700; color:#fff; } .logo span { color:#00d4d8; }
.live-dot { width:12px; height:12px; border-radius:6px; background:#00d4d8; box-shadow:0 0 20px rgba(0,212,216,0.6); }
.center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.big-text { font-size:80px; font-weight:900; color:#fff; line-height:1.05; letter-spacing:-3px; margin-bottom:40px; }
.big-text .orange { color:#f97316; }
.sub { font-size:30px; color:rgba(255,255,255,0.5); font-weight:500; line-height:1.5; max-width:700px; margin-bottom:60px; }
.mic-icon { width:120px; height:120px; border-radius:60px; background:linear-gradient(135deg,#00d4d8,#0891b2); display:flex; align-items:center; justify-content:center; font-size:52px; margin-bottom:30px; box-shadow:0 0 60px rgba(0,212,216,0.3); }
.mic-label { font-size:18px; color:#00d4d8; font-weight:600; letter-spacing:3px; text-transform:uppercase; }
.bottom { display:flex; justify-content:space-between; align-items:flex-end; }
.cta { font-size:22px; color:rgba(255,255,255,0.4); } .cta strong { color:#f97316; }
.handle { font-size:16px; color:rgba(255,255,255,0.25); letter-spacing:2px; font-weight:600; }
</style></head><body>
<div class="bg"></div>
<div class="container">
  <div class="top-bar">
    <div class="logo">Riley<span>AI</span></div>
    <div class="live-dot"></div>
  </div>
  <div class="center">
    <div class="mic-icon">🎙️</div>
    <div class="mic-label">Voice Mode Active</div>
    <div style="height:40px"></div>
    <div class="big-text">This changed how I trade <span class="orange">forever.</span></div>
    <div class="sub">Talk to Riley like a real trading coach. Hands-free guidance while you trade. Ask anything. Get instant answers.</div>
  </div>
  <div class="bottom">
    <div class="cta">Coming soon. <strong>askrileyai.com</strong></div>
    <div class="handle">@askrileyai</div>
  </div>
</div>
</body></html>
