# Railway Deployment Configuration for RileyAI Website (Next.js)

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Railway will automatically detect Node.js and install dependencies
# Make sure Node.js version is >= 18.0.0 (specified in package.json engines)

[env]
# Environment variables should be set in Railway dashboard
# Required variables:
# - NEXT_PUBLIC_API_URL
# - NEXT_PUBLIC_WS_URL
# - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
# - NEXT_PUBLIC_APP_URL
# - NEXT_PUBLIC_PLAID_CLIENT_ID
# - NEXT_PUBLIC_EXTENSION_ID
# - NEXT_PUBLIC_ENABLE_INVESTMENTS
# - NEXT_PUBLIC_ENABLE_TRADING_DESK
