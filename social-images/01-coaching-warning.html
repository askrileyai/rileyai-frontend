<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#050510; font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; position:relative; }
.bg-glow { position:absolute; top:-200px; left:50%; transform:translateX(-50%); width:800px; height:800px; background:radial-gradient(circle,rgba(0,212,216,0.08) 0%,transparent 70%); pointer-events:none; }
.bg-glow-orange { position:absolute; bottom:-100px; right:-100px; width:600px; height:600px; background:radial-gradient(circle,rgba(249,115,22,0.06) 0%,transparent 70%); pointer-events:none; }
.container { padding:80px 70px; height:100%; display:flex; flex-direction:column; position:relative; z-index:2; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:60px; }
.logo { font-size:28px; font-weight:700; color:#fff; letter-spacing:-0.5px; }
.logo span { color:#00d4d8; }
.badge { background:rgba(249,115,22,0.12); border:1px solid rgba(249,115,22,0.3); color:#f97316; font-size:14px; font-weight:600; padding:8px 18px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }
.hook { font-size:72px; font-weight:900; color:#fff; line-height:1.1; margin-bottom:40px; letter-spacing:-2px; }
.hook .cyan { color:#00d4d8; }
.hook .orange { color:#f97316; }
.divider { width:80px; height:4px; background:linear-gradient(90deg,#00d4d8,#f97316); border-radius:2px; margin-bottom:40px; }
.chat-bubble { background:rgba(0,212,216,0.06); border:1px solid rgba(0,212,216,0.15); border-radius:24px; padding:32px 36px; margin-bottom:20px; }
.chat-label { font-size:16px; font-weight:700; color:#00d4d8; margin-bottom:10px; letter-spacing:1px; }
.chat-text { font-size:28px; color:rgba(255,255,255,0.85); line-height:1.5; font-weight:500; }
.user-bubble { background:rgba(249,115,22,0.06); border:1px solid rgba(249,115,22,0.15); }
.user-label { color:#f97316; }
.bottom { margin-top:auto; display:flex; justify-content:space-between; align-items:flex-end; }
.cta { font-size:22px; color:rgba(255,255,255,0.4); font-weight:500; }
.cta strong { color:#00d4d8; font-weight:700; }
.feature-tag { font-size:16px; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; font-weight:600; }
</style></head><body>
<div class="bg-glow"></div>
<div class="bg-glow-orange"></div>
<div class="container">
  <div class="top-bar">
    <div class="logo">Riley<span>AI</span></div>
    <div class="badge">Real-Time Coaching</div>
  </div>
  <div class="hook">"You weren't supposed to <span class="orange">take that trade.</span>"</div>
  <div class="divider"></div>
  <div class="chat-bubble">
    <div class="chat-label">RILEY</div>
    <div class="chat-text">That's not your plan. You said you'd wait for the pullback. Close this.</div>
  </div>
  <div class="chat-bubble user-bubble">
    <div class="chat-label user-label">YOU</div>
    <div class="chat-text">...damn. You're right.</div>
  </div>
  <div class="bottom">
    <div class="cta">Stop losing money. <strong>askrileyai.com</strong></div>
    <div class="feature-tag">@askrileyai</div>
  </div>
</div>
</body></html>
