<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; background:#050510; font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; position:relative; }
.container { padding:80px 70px; height:100%; display:flex; flex-direction:column; position:relative; z-index:2; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:80px; }
.logo { font-size:28px; font-weight:700; color:#fff; } .logo span { color:#00d4d8; }
.center { flex:1; display:flex; flex-direction:column; justify-content:center; }
.hook { font-size:76px; font-weight:900; color:#fff; line-height:1.08; margin-bottom:50px; letter-spacing:-3px; text-align:center; }
.hook .orange { color:#f97316; }
.stats { display:flex; gap:20px; margin-bottom:50px; }
.stat { flex:1; text-align:center; padding:30px 20px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:18px; }
.stat-val { font-size:44px; font-weight:800; margin-bottom:6px; }
.stat-val.cyan { color:#00d4d8; } .stat-val.orange { color:#f97316; } .stat-val.green { color:#22c55e; }
.stat-label { font-size:15px; color:rgba(255,255,255,0.35); font-weight:500; }
.quote { font-size:28px; color:rgba(255,255,255,0.5); text-align:center; font-style:italic; line-height:1.5; }
.bottom { margin-top:auto; display:flex; justify-content:space-between; align-items:flex-end; }
.cta { font-size:22px; color:rgba(255,255,255,0.4); } .cta strong { color:#f97316; }
.handle { font-size:16px; color:rgba(255,255,255,0.25); letter-spacing:2px; font-weight:600; }
</style></head><body>
<div class="container">
  <div class="top-bar"><div class="logo">Riley<span>AI</span></div></div>
  <div class="center">
    <div class="hook">Traders with a plan win <span class="orange">3x more.</span></div>
    <div class="stats">
      <div class="stat"><div class="stat-val cyan">68%</div><div class="stat-label">Win rate with plan</div></div>
      <div class="stat"><div class="stat-val orange">22%</div><div class="stat-label">Win rate without</div></div>
      <div class="stat"><div class="stat-val green">3.1x</div><div class="stat-label">Better risk/reward</div></div>
    </div>
    <div class="quote">"I stopped winging it. Riley makes me plan every trade before I take it. My account finally grew."</div>
  </div>
  <div class="bottom">
    <div class="cta">Coming soon. <strong>askrileyai.com</strong></div>
    <div class="handle">@askrileyai</div>
  </div>
</div>
</body></html>
